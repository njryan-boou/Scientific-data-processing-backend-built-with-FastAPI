name: Tests

on:
  push:
  pull_request:

jobs:
  cpp-math:
    name: C++ and Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pybind11

      - name: Configure CMake
        run: cmake -S cpp_math -B cpp_math/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build C++ targets and Python extension
        run: cmake --build cpp_math/build --config Debug --parallel

      - name: Run C++ tests
        run: ctest --test-dir cpp_math/build -C Debug --output-on-failure

      - name: Run Python tests
        run: python cpp_math/tests/python/run_tests.py
